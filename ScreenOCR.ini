[OCR]
; Uses the first enabled engine, falls back to the other if recognition fails
GlobalHotkey =
; "traytip" or "snoretoast"
NotificationMethod = traytip
Notify = 1
; "builtin" or "flameshot"
ScreenshotTool = builtin

; OCR status messages
[NotifyMessages]
RecogMsg = Recognizing...
NoTextMsg = No text found

[Tesseract]
Hotkey = ^!o
; Comma-separated Tesseract language codes (e.g. eng, chi_sim)
; Tesseract multi-language uses built-in "+" syntax (e.g. eng+chi_sim)
; Empty = disable this engine
Languages = eng
; Path to tessdata directory. Default: %TESSDATA_PREFIX%
; Custom example: C:\Program Files\Tesseract-OCR\tessdata
Tessdata =

[RapidOCR]
Hotkey = ^!+o
; See https://rapidai.github.io/RapidOCRDocs/main/model_list/#pp-ocrv5_2
; Run: uv run lib\rapidocr_cli.py --list-langs
; Single RapidOCR language code (e.g. ch, en, japan)
; RapidOCR does not support multi-language recognition
; Empty = disable this engine
Languages = ch

; <lang_code>: <hotkey>
[TesseractLangHotkey]

; <lang_code>: <hotkey>
[RapidOCRLangHotkey]
chinese_cht =
